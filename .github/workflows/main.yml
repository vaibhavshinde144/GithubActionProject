name: DevOpsProject

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

jobs:
  run-tests:
    name: Build and Execute Automation Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      HEADLESS_MODE: "true"
      DISPLAY: ":99"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Install Chrome & XVFB
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser xvfb

      - name: Start Virtual Display
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &

      - name: Build Maven Project
        working-directory: DevOpsProject
        run: mvn clean compile

      - name: Execute TestNG Tests
        working-directory: DevOpsProject
        run: mvn test --fail-at-end

      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: DevOpsProject/target/cucumber-report.html

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: DevOpsProject/ExtentReport/extent.html
